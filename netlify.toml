[build]
  command = "npm run build"
  publish = "out"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/crm-submit"
  to = "/.netlify/functions/crm-submit"
  status = 200
  force = true

[[redirects]]
  from = "/missed-call-text-back"
  to = "https://trades.strohmpartners.com"
  status = 301

[[redirects]]
  from = "/admin-services"
  to = "https://admin.strohmpartners.com"
  status = 301
